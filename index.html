<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGI × Melbourne Design Week 2026</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" />
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:              #0a0a0a;
      --white:              #fff;
      --line:               #c8c8c8;
      --line-mid:           #d8d8d8;
      --muted:              #555;
      --dim:                #777;
      --col-research:       #c8e800;
      --col-animation:      #ff20c0;
      --col-games:          #1eceff;
      --col-interactivity:  #ff6b1a;
      --mdw-red:            #c0001c;
    }

    html, body {
      background: var(--white);
      color: var(--black);
      font-family: 'Satoshi', sans-serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      min-height: 100%;
    }

    /* ── NAV ─────────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
      background: var(--white);
      position: relative;
      z-index: 200;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-magi {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav-x {
      font-size: 13px;
      font-weight: 300;
      color: var(--line-mid);
      letter-spacing: 0;
    }

    .nav-mdw {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-collab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--mdw-red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .nav-back {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--black); }

    /* ── STAGE ───────────────────────────────────── */
    .stage {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 540px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Stage overlay — fully transparent, no grey vignette */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── FLOATING CARDS ──────────────────────────── */
    .floating-card {
      position: absolute;
      width: 280px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      z-index: 3;
      transition: opacity 0.65s ease, box-shadow 0.35s ease;
      will-change: opacity;
    }
    .floating-card.swapping {
      opacity: 0;
      pointer-events: none;
    }
    .floating-card.card-dim {
      opacity: 0.12;
      pointer-events: none;
    }

    /* Hover lift */
    .floating-card:hover {
      box-shadow: 0 18px 48px rgba(0,0,0,0.15);
      z-index: 20;
    }

    /* Animations only — positions set by JS */
    .card-1 { animation: float1 7s   ease-in-out infinite; }
    .card-2 { animation: float2 8.5s ease-in-out infinite; }
    .card-3 { animation: float3 9s   ease-in-out infinite; }
    .card-4 { animation: float4 7.5s ease-in-out infinite; }

    @keyframes float1 {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-13px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-17px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-11px); }
    }
    @keyframes float4 {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-15px); }
    }

    /* ── Ghost / background depth cards ─────────── */
    .ghost-card {
      pointer-events: none !important;
      cursor: default;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      transition: opacity 1s ease;
    }
    .ghost-card:hover { box-shadow: none; }
    .ghost-card.ghost-fading { opacity: 0; }

    /* Depth tiers — opacity + z-index only; scale lives in keyframes */
    .ghost-near { opacity: 0.14; z-index: 2; }
    .ghost-mid  { opacity: 0.07; z-index: 1; }
    .ghost-far  { opacity: 0.03; z-index: 0; }

    @keyframes ghostNearFloat {
      0%   { transform: scale(0.72) translateY(0px);  }
      100% { transform: scale(0.72) translateY(-9px); }
    }
    @keyframes ghostMidFloat {
      0%   { transform: scale(0.56) translateY(0px);  }
      100% { transform: scale(0.56) translateY(-6px); }
    }
    @keyframes ghostFarFloat {
      0%   { transform: scale(0.40) translateY(0px);  }
      100% { transform: scale(0.40) translateY(-4px); }
    }

    /* Search state modifiers */
    .floating-card.card-dim {
      opacity: 0.12;
      pointer-events: none;
    }
    .floating-card.card-highlight {
      animation-play-state: paused;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      z-index: 15;
    }

    /* ── STAGE NAVIGATION ARROWS ────────────────── */
    .stage-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: none;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(0,0,0,0.3);
      transition: border-color 0.2s ease, color 0.2s ease;
      padding: 0;
    }
    .stage-arrow:hover {
      border-color: rgba(0,0,0,0.28);
      color: rgba(0,0,0,0.65);
    }
    .stage-arrow-left  { left: 28px; }
    .stage-arrow-right { right: 28px; }

    /* ── CARD INTERNALS ──────────────────────────── */
    .fc-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }
    .fc-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .floating-card:hover .fc-thumb img {
      transform: scale(1.04);
    }

    .fc-body {
      padding: 6px 12px 13px;
    }

    /* Floating cards: thumbnail only — no gradient, no text */
    .floating-card .fc-body  { display: none !important; }
    .floating-card .fc-thumb::after { display: none !important; }

    /* ── HOVER PROFILE BUBBLES ───────────────────── */
    .hover-avatar-wrap {
      position: fixed;
      z-index: 35;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.82);
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .hover-avatar-wrap.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .hover-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--white);
      border: 1.5px solid var(--line);
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--muted);
    }
    .hover-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fc-spec {
      display: inline-block;
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 6px;
    }
    .fc-spec-research       { background: var(--col-research);       color: #404a00; }
    .fc-spec-animation      { background: var(--col-animation);      color: #fff; }
    .fc-spec-games          { background: var(--col-games);          color: #003340; }
    .fc-spec-interactivity  { background: var(--col-interactivity);  color: #fff; }

    .fc-title {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--black);
    }

    .fc-student {
      font-size: 10px;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.04em;
      margin-bottom: 0;
    }

    .fc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    .fc-tag {
      font-size: 8px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid var(--line-mid);
      border-radius: 3px;
      color: var(--muted);
    }

    .fc-link {
      font-size: 9.5px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: color 0.15s;
    }
    .fc-link:hover { color: var(--black); }

    /* ── STAGE CENTER ────────────────────────────── */
    .stage-center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      pointer-events: none;
    }

    .stage-logo {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      user-select: none;
    }
    .stage-logo img {
      height: 100px;
      width: auto;
      display: block;
    }

    /* ── SEARCH ──────────────────────────────────── */
    .search-wrap {
      pointer-events: all;
      position: relative;
      width: 310px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 42px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 100px;
      padding: 0 18px 0 38px;
      font-family: 'Satoshi', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    .search-input::placeholder { color: var(--muted); }

    .search-hint {
      font-size: 9.5px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      margin-top: -6px;
    }
    .search-hint span {
      color: var(--dim);
      border-bottom: 1px dashed var(--line-mid);
      cursor: default;
    }

    /* ── MDW LOGO ────────────────────────────────── */
    .mdw-logo-img {
      pointer-events: all;
      height: 52px;
      width: auto;
      display: block;
    }

    /* ── FOOTER STRIP ────────────────────────────── */
    .footer-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      border-top: 1px solid var(--line);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
    }
    .footer-strip-left,
    .footer-strip-right {
      font-size: 9.5px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-strip-right { color: var(--mdw-red); }

    /* ── COLLAB LABEL ────────────────────────────── */
    .collab-label {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }


    /* ── MODAL ───────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(6px);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--white);
      border-radius: 18px;
      overflow: hidden;
      width: 520px;
      max-width: 92vw;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(22px) scale(0.97);
      transition: transform 0.35s ease;
    }
    .modal-backdrop.open .modal-box {
      transform: translateY(0) scale(1);
    }
    .modal-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #f0f0f0;
    }
    .modal-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-body {
      padding: 22px 26px 32px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.25;
      margin: 8px 0 6px;
      color: var(--black);
    }
    .modal-student {
      font-size: 11px;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }
    .modal-description {
      display: none;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line-mid);
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .modal-description.visible {
      display: block;
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.9);
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--black);
      z-index: 10;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #fff; }

    /* ── MODAL AVATARS ──────────────────────────────── */
    .modal-avatar-wrap {
      position: fixed;
      z-index: 650;
      pointer-events: all;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .modal-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--line);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--muted);
      box-shadow: 0 8px 28px rgba(0,0,0,0.15);
      opacity: 0;
      transition: opacity 0.45s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .modal-avatar-wrap:hover .modal-avatar {
      transform: scale(1.08);
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }
    .modal-avatar.visible { opacity: 1; }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .avatar-name {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.45s ease;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .avatar-name.visible { opacity: 1; }

    .av-float-1 { animation: avFloat1 5s   ease-in-out infinite; }
    .av-float-2 { animation: avFloat2 6.5s ease-in-out infinite; }
    .av-float-3 { animation: avFloat3 7s   ease-in-out infinite; }
    .av-float-4 { animation: avFloat4 5.5s ease-in-out infinite; }
    .av-float-5 { animation: avFloat1 8s   ease-in-out infinite; }
    .av-float-6 { animation: avFloat3 6s   ease-in-out infinite; }

    @keyframes avFloat1 { 0%,100% { transform: translateY(0px);   } 50% { transform: translateY(-10px); } }
    @keyframes avFloat2 { 0%,100% { transform: translateY(0px);   } 50% { transform: translateY(-14px); } }
    @keyframes avFloat3 { 0%,100% { transform: translateY(0px);   } 50% { transform: translateY(-8px);  } }
    @keyframes avFloat4 { 0%,100% { transform: translateY(0px);   } 50% { transform: translateY(-12px); } }

    /* ── ARTIST BIO CARD ────────────────────────────── */
    .artist-bio {
      position: fixed;
      z-index: 700;
      width: 240px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 18px 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      opacity: 0;
      transform: scale(0.94) translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: all;
    }
    .artist-bio.open {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .bio-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .bio-close:hover { background: #f0f0f0; }
    .bio-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 1.5px solid var(--line);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .bio-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bio-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 2px;
    }
    .bio-role {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .bio-text {
      font-size: 11.5px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--dim);
    }

    /* ── OUTER RING ──────────────────────────────── */
    .outer-ring-card {
      position: absolute;
      z-index: 0;
      pointer-events: none;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f0f0;
      border: 1px solid rgba(0,0,0,0.06);
      /* opacity set per-card by JS */
      transition: opacity 0.6s ease;
    }
    .outer-ring-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    /* ── PROJECTS GRID SECTION ───────────────────── */
    .projects-section {
      padding: 140px 24px 140px;
      background: var(--white);
      position: relative;
    }


    /* ── FOLDER DATABASE (unified) ───────────────── */
    .folders-wrap {
      max-width: 620px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--white);
    }

    .folder-item {
      border-bottom: 1px solid var(--line);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .folder-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .folder-item:last-child {
      border-bottom: none;
    }
    .folder-item.folder-dim {
      opacity: 0.12;
      pointer-events: none;
    }
    .folder-item.folder-highlight > .folder-tab .folder-tab-title {
      color: var(--black);
    }

    .folder-tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 17px 24px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }
    .folder-tab-left {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .folder-tab:hover {
      background: rgba(0,0,0,0.025);
    }
    .folder-item.open > .folder-tab {
      background: rgba(0,0,0,0.02);
    }

    .folder-tab-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--black);
    }
    .folder-tab-sub {
      font-size: 10.5px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--dim);
      margin-top: 2px;
      text-transform: none;
    }
    .folder-tab-arrow {
      flex-shrink: 0;
      color: var(--line);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s ease;
      display: flex;
      align-items: center;
    }
    .folder-item.open .folder-tab-arrow {
      transform: rotate(180deg);
      color: var(--dim);
    }

    .folder-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─────────────────────────────────────────────────────────────────
     *  Everything below is the runtime — no more card-swap machinery.
     *  The hero stage has ghost / outer-ring decoration only.
     *  Projects are revealed in the scrollable grid below the hero.
     * ───────────────────────────────────────────────────────────────── */

    function isMobile() { return window.innerWidth < 600; }

    /* ── Ghost orbit math (background decoration) ── */
    function CARD_W() { return isMobile() ? 120 : 200; }
    function CARD_H() { return Math.round(CARD_W() * 9 / 16); }

    function getOrbit() {
      const W = window.innerWidth, H = window.innerHeight;
      const mob = isMobile();
      return {
        rx: mob ? Math.min(W * 0.38, 165) : Math.min(360, W * 0.26),
        ry: mob ? Math.min(H * 0.30, 220) : Math.min(290, H * 0.30),
        cx: W / 2, cy: H / 2,
      };
    }

    function angleToPos(angle) {
      const { rx, ry, cx, cy } = getOrbit();
      const cw = CARD_W(), ch = CARD_H();
      const rad = (angle * Math.PI) / 180;
      return {
        left: Math.max(8, Math.min(window.innerWidth  - cw - 8, cx + rx * Math.cos(rad) - cw / 2)),
        top:  Math.max(8, Math.min(window.innerHeight - ch - 8, cy + ry * Math.sin(rad) - ch / 2)),
      };
    }

    /* ── Ghost background cards ── */
    const GHOST_DEPTH_DEFS = [
      { cls: 'ghost-near', anim: 'ghostNearFloat', dur: '13s', delay: '0s'   },
      { cls: 'ghost-far',  anim: 'ghostFarFloat',  dur: '21s', delay: '-8s'  },
      { cls: 'ghost-mid',  anim: 'ghostMidFloat',  dur: '17s', delay: '-4s'  },
      { cls: 'ghost-near', anim: 'ghostNearFloat', dur: '15s', delay: '-11s' },
      { cls: 'ghost-far',  anim: 'ghostFarFloat',  dur: '19s', delay: '-6s'  },
      { cls: 'ghost-mid',  anim: 'ghostMidFloat',  dur: '23s', delay: '-15s' },
    ];

    function findGhostAngle(takenAngles) {
      let best = 0, bestDist = -1;
      for (let a = 0; a < 360; a += 3) {
        const minDist = takenAngles.length
          ? Math.min(...takenAngles.map(o => { const d = Math.abs(a - o) % 360; return d > 180 ? 360 - d : d; }))
          : 360;
        if (minDist > bestDist) { bestDist = minDist; best = a; }
      }
      return (best + (Math.random() - 0.5) * 28 + 360) % 360;
    }

    (function initGhosts() {
      const stage = document.querySelector('.stage');
      const takenAngles = [];
      GHOST_DEPTH_DEFS.forEach((def, i) => {
        const angle = findGhostAngle(takenAngles);
        takenAngles.push(angle);
        const pos  = angleToPos(angle);
        const proj = PROJECTS[i % PROJECTS.length];
        const ghost = document.createElement('div');
        ghost.className = `floating-card ghost-card ${def.cls}`;
        ghost.style.left              = pos.left + 'px';
        ghost.style.top               = pos.top  + 'px';
        ghost.style.animationName     = def.anim;
        ghost.style.animationDuration = def.dur;
        ghost.style.animationDelay    = def.delay;
        ghost.innerHTML = `<div class="fc-thumb"><img src="${proj.img}" alt="${proj.title}" loading="lazy" /></div>`;
        stage.insertBefore(ghost, stage.firstChild);
      });
    })();

    /* ── Foreground floating cards ───────────────────────────────────── */
    const cards = [...document.querySelectorAll('.floating-card:not(.ghost-card)')];

    /* Foreground card dimensions (larger than ghost) */
    function FG_W() { return isMobile() ? 155 : 280; }
    function FG_H() { return Math.round(FG_W() * 9 / 16); }

    function angleToPosFG(angle) {
      const { rx, ry, cx, cy } = getOrbit();
      const cw = FG_W(), ch = FG_H();
      const rad = (angle * Math.PI) / 180;
      return {
        left: Math.max(8, Math.min(window.innerWidth  - cw - 8, cx + rx * Math.cos(rad) - cw / 2)),
        top:  Math.max(8, Math.min(window.innerHeight - ch - 8, cy + ry * Math.sin(rad) - ch / 2)),
      };
    }

    /* Organic angle seeding — first card random, each next fills widest gap */
    let cardAngles = (() => {
      const angles = [Math.random() * 360];
      for (let i = 1; i < 4; i++) {
        let best = 0, bestDist = -1;
        for (let a = 0; a < 360; a += 3) {
          const minDist = Math.min(...angles.map(o => { const d = Math.abs(a-o)%360; return d>180?360-d:d; }));
          if (minDist > bestDist) { bestDist = minDist; best = a; }
        }
        angles.push((best + (Math.random()-0.5)*50 + 360) % 360);
      }
      return angles;
    })();

    function placeCard(card, i) {
      const pos = angleToPosFG(cardAngles[i]);
      card.style.left = pos.left + 'px';
      card.style.top  = pos.top  + 'px';
    }

    function renderFGCard(card, project) {
      const img = card.querySelector('.fc-thumb img');
      if (img) { img.src = project.img; img.alt = project.title; }
      card.dataset.search = project.search || '';
      card._proj = project;
    }

    /* Init — show first 4 projects in the foreground */
    let fgOffset = 0;
    cards.forEach((card, i) => {
      renderFGCard(card, PROJECTS[i % PROJECTS.length]);
      placeCard(card, i);
      card.addEventListener('click',      () => openModal(card._proj));
      card.addEventListener('mouseenter', () => showHoverAvatars(card, card._proj));
      card.addEventListener('mouseleave', () => hideHoverAvatars());
    });

    /* Cycle foreground cards left / right — fade all out, stagger fade in */
    function cycleFG(dir) {
      fgOffset = (fgOffset + dir + PROJECTS.length) % PROJECTS.length;
      cards.forEach(card => card.classList.add('swapping'));
      cards.forEach((card, i) => {
        setTimeout(() => {
          renderFGCard(card, PROJECTS[(fgOffset + i) % PROJECTS.length]);
          card.classList.remove('swapping');
        }, 350 + i * 130);
      });
    }
    document.getElementById('arrowLeft').addEventListener('click',  () => cycleFG(-1));
    document.getElementById('arrowRight').addEventListener('click', () => cycleFG(1));

    /* Reposition on viewport resize */
    window.addEventListener('resize', () => {
      cards.forEach((card, i) => placeCard(card, i));
    });

    /* ── Outer rotating ring ── */
    const OUTER_COUNT = 6;
    const OUTER_SLOTS = [
      { w: 118, op: 0.09 }, { w:  96, op: 0.04 },
      { w: 108, op: 0.07 }, { w: 100, op: 0.05 },
      { w: 115, op: 0.08 }, { w:  92, op: 0.04 },
    ];

    function getOuterOrbit() {
      const W = window.innerWidth, H = window.innerHeight;
      const { cx, cy } = getOrbit();
      return { rx: Math.min(W * 0.44, 500), ry: Math.min(H * 0.38, 380), cx, cy };
    }

    function outerPos(angleDeg, cardW) {
      const { rx, ry, cx, cy } = getOuterOrbit();
      const W = window.innerWidth, H = window.innerHeight;
      const rad = (angleDeg * Math.PI) / 180;
      const cardH = Math.round(cardW * 9 / 16);
      return {
        left: Math.max(2, Math.min(W - cardW - 2, cx + rx * Math.cos(rad) - cardW / 2)),
        top:  Math.max(2, Math.min(H - cardH - 2, cy + ry * Math.sin(rad) - cardH / 2)),
      };
    }

    const outerEls = [];
    let outerOffset = 0;

    (function initOuterRing() {
      if (isMobile()) return;
      const stage = document.querySelector('.stage');
      for (let i = 0; i < OUTER_COUNT; i++) {
        const baseAngle = (360 / OUTER_COUNT) * i;
        const slot = OUTER_SLOTS[i % OUTER_SLOTS.length];
        const proj = PROJECTS[i % PROJECTS.length];
        const el = document.createElement('div');
        el.className = 'outer-ring-card';
        el.style.width   = slot.w + 'px';
        el.style.opacity = slot.op;
        el.innerHTML = `<img src="${proj.img}" alt="" loading="lazy" />`;
        const p = outerPos(baseAngle, slot.w);
        el.style.left = p.left + 'px';
        el.style.top  = p.top  + 'px';
        stage.insertBefore(el, stage.firstChild);
        outerEls.push({ el, baseAngle, w: slot.w });
      }
      (function tick() {
        outerOffset = (outerOffset + 0.01) % 360;
        outerEls.forEach(({ el, baseAngle, w }) => {
          const p = outerPos((baseAngle + outerOffset) % 360, w);
          el.style.left = p.left + 'px';
          el.style.top  = p.top  + 'px';
        });
        requestAnimationFrame(tick);
      })();
    })();

    /* ── Project folders (accordion) ── */
    (function buildFolders() {
      const wrap = document.getElementById('foldersWrap');
      let openItem = null;

      PROJECTS.forEach((proj, idx) => {
        const item = document.createElement('div');
        item.className = 'folder-item';
        item.dataset.search = proj.search || '';
        item.dataset.idx    = idx;

        const artistNames = proj.artists && proj.artists.length
          ? proj.artists.map(a => a.name).join(', ')
          : (proj.student || '');

        item.innerHTML = `
          <div class="folder-tab">
            <div class="folder-tab-left">
              <div class="folder-tab-title">${proj.title}</div>
              ${artistNames ? `<div class="folder-tab-sub">${artistNames}</div>` : ''}
            </div>
            <span class="folder-tab-arrow">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <div class="folder-content">
            <div class="folder-inner">
              <div class="folder-thumb">
                <img src="${proj.img}" alt="${proj.title}" loading="lazy" />
              </div>
              <div class="folder-tags">${proj.tags.map(t => `<span class="fc-tag">${t}</span>`).join('')}</div>
              ${proj.description ? `<div class="folder-desc">${proj.description}</div>` : ''}
              ${proj.artists && proj.artists.length ? `
              <div class="folder-artists">
                ${proj.artists.map((a, ai) => {
                  const initials = a.name.split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase();
                  return `<div class="folder-artist-bubble" data-artist-idx="${ai}">
                    <div class="folder-artist-avatar">
                      ${a.photo
                        ? `<img src="${a.photo}" alt="${a.name}" loading="lazy" />`
                        : `<div class="folder-artist-avatar-initials">${initials}</div>`}
                    </div>
                    <span class="folder-artist-name">${a.name}</span>
                  </div>`;
                }).join('')}
              </div>` : ''}
              <div class="folder-open-cta">↗ Click image to view full project</div>
            </div>
          </div>`;

        /* Tab click — toggle this folder, close any other */
        item.querySelector('.folder-tab').addEventListener('click', () => {
          const isOpen = item.classList.contains('open');
          if (openItem && openItem !== item) {
            openItem.classList.remove('open');
          }
          item.classList.toggle('open', !isOpen);
          openItem = !isOpen ? item : null;
        });

        /* Thumbnail click — open modal with full artist experience */
        item.querySelector('.folder-thumb').addEventListener('click', e => {
          e.stopPropagation();
          openModal(proj);
        });

        /* Artist bubble clicks — open modal (full experience with that artist's bio) */
        item.querySelectorAll('.folder-artist-bubble').forEach(bubble => {
          bubble.addEventListener('click', e => {
            e.stopPropagation();
            openModal(proj);
          });
        });

        wrap.appendChild(item);
      });

      /* Scroll-reveal — stagger each row as the container enters view */
      const io = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            wrap.querySelectorAll('.folder-item').forEach((item, i) => {
              setTimeout(() => item.classList.add('visible'), i * 100);
            });
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05 });
      io.observe(wrap);
    })();

    /* ── Search — filters folders ── */
    const searchInput = document.getElementById('searchInput');

    function applySearch() {
      const q = searchInput.value.trim().toLowerCase();
      document.querySelectorAll('.folder-item').forEach(item => {
        if (!q) {
          item.classList.remove('folder-dim', 'folder-highlight');
          return;
        }
        const hit = (item.dataset.search || '').toLowerCase().includes(q);
        item.classList.toggle('folder-highlight', hit);
        item.classList.toggle('folder-dim', !hit);
        /* Auto-open the first matching folder */
        if (hit && !item.classList.contains('open')) {
          const firstMatch = document.querySelector('.folder-item.folder-highlight');
          if (firstMatch === item) item.classList.add('open');
        }
      });
      if (q) document.querySelector('.projects-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    searchInput.addEventListener('input', applySearch);
    document.querySelectorAll('.search-hint span').forEach(chip => {
      chip.addEventListener('click', () => {
        searchInput.value = chip.textContent.trim();
        applySearch();
        searchInput.focus();
      });
    });

    /* ── Hover avatar bubbles ── */
    let hoverAvatarWraps = [];
    let hoverAvatarRemovalTimer;
    let hoverAvatarToken = 0;

    function artistInitials(name) {
      return name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function seededNoise(seed) { const x = Math.sin(seed * 999) * 10000; return x - Math.floor(x); }

    function hoverAvatarPosition(card, index, total, projectIdx) {
      const rect = card.getBoundingClientRect();
      const angleJitter = (seededNoise((projectIdx + 1) * 17 + index) - 0.5) * 44;
      const angle = (-90 + (360 / total) * index + angleJitter) * Math.PI / 180;
      const rx = Math.max(rect.width  * 0.62, 96) * (0.82 + seededNoise((projectIdx + 1) * 29 + index) * 0.42);
      const ry = Math.max(rect.height * 0.86, 78) * (0.82 + seededNoise((projectIdx + 1) * 37 + index) * 0.42);
      return {
        x: clamp(rect.left + rect.width  / 2 + Math.cos(angle) * rx, 32, window.innerWidth  - 32),
        y: clamp(rect.top  + rect.height / 2 + Math.sin(angle) * ry, 32, window.innerHeight - 32),
      };
    }

    function hideHoverAvatars(immediate = false) {
      clearTimeout(hoverAvatarRemovalTimer);
      hoverAvatarToken++;
      if (immediate) { hoverAvatarWraps.forEach(w => w.remove()); hoverAvatarWraps = []; return; }
      const wraps = [...hoverAvatarWraps];
      const stepMs = 65, fadeMs = 280;
      wraps.forEach((wrap, i) => { wrap.style.transitionDelay = ((wraps.length - 1 - i) * stepMs) + 'ms'; wrap.classList.remove('visible'); });
      hoverAvatarRemovalTimer = setTimeout(() => {
        wraps.forEach(wrap => wrap.remove());
        hoverAvatarWraps = hoverAvatarWraps.filter(w => !wraps.includes(w));
      }, fadeMs + Math.max(0, wraps.length - 1) * stepMs + 40);
    }

    function showHoverAvatars(card, project) {
      if (!project || !project.artists || !project.artists.length) return;
      hideHoverAvatars(true);
      const projectIdx = PROJECTS.indexOf(project);
      const token = ++hoverAvatarToken;
      project.artists.forEach((artist, i) => {
        const pos = hoverAvatarPosition(card, i, project.artists.length, projectIdx);
        const wrap = document.createElement('div');
        wrap.className = 'hover-avatar-wrap';
        wrap.style.left = pos.x + 'px';
        wrap.style.top  = pos.y + 'px';
        wrap.style.transitionDelay = (i * 75) + 'ms';
        wrap.innerHTML = `<div class="hover-avatar">${artist.photo ? `<img src="${artist.photo}" alt="${artist.name}" />` : artistInitials(artist.name)}</div>`;
        document.body.appendChild(wrap);
        hoverAvatarWraps.push(wrap);
      });
      requestAnimationFrame(() => {
        if (token !== hoverAvatarToken) return;
        hoverAvatarWraps.forEach(wrap => wrap.classList.add('visible'));
      });
    }

    window.addEventListener('resize', () => hideHoverAvatars(true));

    /* ── Modal ── */
    const backdrop     = document.getElementById('modalBackdrop');
    const modalImg     = document.getElementById('modalImg');
    const modalSpec    = document.getElementById('modalSpec');
    const modalTitle   = document.getElementById('modalTitle');
    const modalStudent = document.getElementById('modalStudent');
    const modalTags    = document.getElementById('modalTags');
    const modalDescription = document.getElementById('modalDescription');

    /* Floating artist avatars around the modal */
    let avatarWraps = [];
    const floatClasses = ['av-float-1','av-float-2','av-float-3','av-float-4','av-float-5','av-float-6'];

    const bioCard = document.createElement('div');
    bioCard.className = 'artist-bio';
    bioCard.innerHTML = `
      <button class="bio-close" id="bioClose">✕</button>
      <div class="bio-avatar" id="bioAvatar"></div>
      <div class="bio-name"   id="bioName"></div>
      <div class="bio-role"   id="bioRole"></div>
      <div class="bio-text"   id="bioText"></div>`;
    document.body.appendChild(bioCard);
    document.getElementById('bioClose').addEventListener('click', () => bioCard.classList.remove('open'));

    function showBio(artist, anchorX, anchorY) {
      const W = window.innerWidth, H = window.innerHeight, BW = 240, BH = 200;
      document.getElementById('bioAvatar').innerHTML = artist.photo
        ? `<img src="${artist.photo}" alt="${artist.name}" />`
        : artist.name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
      document.getElementById('bioName').textContent = artist.name;
      document.getElementById('bioRole').textContent = artist.role || 'RMIT MAGI — 2026';
      document.getElementById('bioText').textContent = artist.bio  || 'Bio coming soon.';
      const onLeft = anchorX < W / 2;
      let left = onLeft ? anchorX - BW - 52 : anchorX + 52;
      let top  = anchorY - BH / 2;
      if (left < 12) left = 12; if (left + BW > W - 12) left = W - BW - 12;
      if (top  < 12) top  = 12; if (top  + BH > H - 12) top  = H - BH - 12;
      bioCard.style.left = left + 'px';
      bioCard.style.top  = top  + 'px';
      bioCard.classList.add('open');
    }

    function createAvatars(artists) {
      avatarWraps.forEach(w => w.remove());
      avatarWraps = [];
      bioCard.classList.remove('open');
      const W = window.innerWidth, H = window.innerHeight;
      const cx = W / 2, cy = H / 2;
      const orbitR = Math.min(360, Math.min(W, H) * 0.3);
      const baseAngle = Math.random() * 360;
      artists.forEach((artist, i) => {
        const angle = baseAngle + (360 / artists.length) * i + (Math.random() * 24 - 12);
        const rad = (angle * Math.PI) / 180;
        const x = cx + orbitR * Math.cos(rad);
        const y = cy + orbitR * Math.sin(rad);
        const wrap = document.createElement('div');
        wrap.className = 'modal-avatar-wrap';
        wrap.style.left = x + 'px'; wrap.style.top = y + 'px';
        const av = document.createElement('div');
        av.className = 'modal-avatar ' + floatClasses[i % floatClasses.length];
        av.innerHTML = artist.photo ? `<img src="${artist.photo}" alt="${artist.name}" />` : artist.name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
        const label = document.createElement('div');
        label.className = 'avatar-name';
        label.textContent = artist.name.split(' ')[0];
        wrap.appendChild(av); wrap.appendChild(label);
        document.body.appendChild(wrap);
        avatarWraps.push(wrap);
        wrap.addEventListener('click', e => { e.stopPropagation(); showBio(artist, x, y); });
        setTimeout(() => { av.classList.add('visible'); label.classList.add('visible'); }, i * 80 + 60);
      });
    }

    function removeAvatars() {
      bioCard.classList.remove('open');
      avatarWraps.forEach(wrap => {
        wrap.querySelectorAll('.modal-avatar, .avatar-name').forEach(el => el.classList.remove('visible'));
        setTimeout(() => wrap.remove(), 450);
      });
      avatarWraps = [];
    }

    function openModal(project) {
      hideHoverAvatars(true);
      modalImg.src             = project.img;
      modalImg.alt             = project.title;
      modalTitle.textContent   = project.title;
      modalStudent.textContent = project.student;
      modalTags.innerHTML      = project.tags.map(t => `<span class="fc-tag">${t}</span>`).join('');
      modalDescription.textContent = project.description || '';
      modalDescription.classList.toggle('visible', Boolean(project.description));
      backdrop.classList.add('open');
      if (project.artists && project.artists.length) createAvatars(project.artists);
    }

    function closeModal() {
      backdrop.classList.remove('open');
      removeAvatars();
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) closeModal();
      else bioCard.classList.remove('open');
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
